[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[tool.ruff.lint.isort]
known-first-party = ["ghost_yt_downloader"]

[tool.mypy]
python_version = "3.11"
files = ["ghost_yt_downloader.py", "download_transcript.py", "main.py"]
warn_unused_configs = true
check_untyped_defs = true
ignore_missing_imports = true
